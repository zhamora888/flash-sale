version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: flash-sale-redis
    ports:
      - '6379:6379'
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
